name: tca-api-headless
type: typo3
docroot: public
php_version: "8.3"
webserver_type: apache-fpm
database:
  type: mariadb
  version: "10.11"
composer_version: "2"
web_environment:
  - typo3DatabaseDriver=pdo_mysql
  - typo3DatabaseHost=db
  - typo3DatabasePort=3306
  - typo3DatabaseName=db
  - typo3DatabaseUsername=root
  - typo3DatabasePassword=root
