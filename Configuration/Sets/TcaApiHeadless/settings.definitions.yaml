categories:

  TcaApiHeadless:
    label: 'TCA API Headless'

settings:

  tca_api_headless.enabled:
    label: 'Enable headless page API'
    description: 'Enable or disable headless page composition for this site.'
    category: TcaApiHeadless
    type: bool
    default: true

  tca_api_headless.basePath:
    label: 'Base path'
    description: 'URL path prefix for headless endpoints (e.g. /_headless/page/{id}). Must start with a slash and must not end with one.'
    category: TcaApiHeadless
    type: string
    default: /_headless
