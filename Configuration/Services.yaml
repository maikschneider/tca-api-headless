services:
  _defaults:
    autowire: true
    autoconfigure: true
    public: false

  MaikSchneider\HeadlessPages\:
    resource: '../Classes/*'

  _instanceof:
    MaikSchneider\HeadlessPages\Block\BlockSerializerInterface:
      tags: [ 'headless_pages.block_serializer' ]

  MaikSchneider\HeadlessPages\Block\BlockSerializerRegistry:
    public: true
    arguments:
      $serializers: !tagged_iterator headless_pages.block_serializer

  # ── Page payload cache ─────────────────────────────────────────────
  cache.headless_pages:
    class: TYPO3\CMS\Core\Cache\Frontend\FrontendInterface
    factory: ['@TYPO3\CMS\Core\Cache\CacheManager', 'getCache']
    arguments: ['headless_pages']

  MaikSchneider\HeadlessPages\Cache\CacheInvalidationHook:
    public: true
    arguments:
      $cache: '@cache.headless_pages'

  # Public for retrieval from the container in functional tests.
  MaikSchneider\HeadlessPages\Composition\PageComposer:
    public: true
    arguments:
      $cache: '@cache.headless_pages'

  MaikSchneider\HeadlessPages\Navigation\NavigationBuilder:
    public: true
